<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ColourNora Admin</title><style>body{font-family:Arial;max-width:980px;margin:auto;padding:24px;background:#f5f5f2}.card{background:white;padding:16px;margin:12px 0;border:1px solid #ddd}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,textarea,select{width:100%;padding:9px;box-sizing:border-box}button{padding:11px 16px;background:#173e34;color:white;border:0;margin:6px 6px 6px 0}@media(max-width:650px){.grid{grid-template-columns:1fr}}</style></head><body><h1>ColourNora Verwaltung</h1><p>Werkdaten bearbeiten und anschließend die neue <b>content.json</b> herunterladen. Diese Datei bei GitHub ersetzen.</p><div id="app"></div><button id="add">Werk hinzufügen</button><button id="save">content.json herunterladen</button><script>let data;fetch('../content.json').then(r=>r.json()).then(d=>{data=d;render()});function input(k,v,i){return `<label>${k}<input data-i="${i}" data-k="${k}" value="${String(v||'').replace(/"/g,'&quot;')}"></label>`}function render(){app.innerHTML=data.works.map((w,i)=>`<div class="card"><div class="grid">${input('title',w.title,i)}${input('medium',w.medium,i)}${input('size',w.size,i)}${input('price',w.price,i)}${input('status',w.status,i)}${input('original',w.original,i)}${input('detail',w.detail,i)}${input('mockup',w.mockup,i)}</div><button onclick="data.works.splice(${i},1);render()">Löschen</button></div>`).join('');document.querySelectorAll('[data-k]').forEach(e=>e.oninput=()=>data.works[+e.dataset.i][e.dataset.k]=e.value)};add.onclick=()=>{data.works.unshift({title:'Neues Werk',original:'assets/',detail:'assets/',mockup:'assets/',size:'',medium:'',price:'',status:'Verfügbar',description:'',category:'Leinwand',framing:'Ungerahmt'});render()};save.onclick=()=>{let b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='content.json';a.click()};</script></body></html>
