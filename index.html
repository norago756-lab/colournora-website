<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ColourNora Admin</title><style>body{font:16px system-ui;margin:0;background:#f5f5f2;color:#111}.wrap{max-width:1050px;margin:auto;padding:30px}h1{font-size:2.5rem}.notice{background:#fff7d9;padding:14px;border:1px solid #ead58b}.toolbar{position:sticky;top:0;background:#f5f5f2;padding:12px 0;z-index:2}button{border:0;background:#17483c;color:white;padding:12px 16px;margin:4px}.secondary{background:#666}.card{background:#fff;border:1px solid #ddd;padding:18px;margin:16px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{font-size:.8rem}input,textarea,select{display:block;width:100%;padding:10px;border:1px solid #ccc;font:inherit;margin-top:5px}.danger{background:#a23}.login{max-width:400px;margin:15vh auto;background:#fff;padding:30px} @media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><div id="login" class="login"><h1>Admin</h1><p>Zugangscode eingeben</p><input id="code" type="password"><button id="go">Öffnen</button><p><small>Standardcode: colournora</small></p></div><div id="app" class="wrap" hidden><h1>ColourNora Verwaltung</h1><p class="notice">Änderungen sind sofort als Vorschau in diesem Browser sichtbar. Für eine dauerhafte Veröffentlichung für alle Besucher bitte anschließend <strong>content.json herunterladen</strong> und die Datei bei GitHub ersetzen.</p><div class="toolbar"><button id="add">+ Werk hinzufügen</button><button id="save">Änderungen speichern</button><button id="download" class="secondary">content.json herunterladen</button><a href="../" target="_blank"><button class="secondary">Website öffnen</button></a></div><div id="general"></div><h2>Werke</h2><div id="works"></div></div><script>
let data;document.getElementById('go').onclick=()=>{if(document.getElementById('code').value==='colournora'){login.hidden=true;app.hidden=false;load()}else alert('Falscher Code')};
function load(){fetch('../content.json').then(r=>r.json()).then(d=>{data=localStorage.getItem('colournora_content')?JSON.parse(localStorage.getItem('colournora_content')):d;render()})}
function f(label,key,val,i,type='text'){return `<label>${label}<${type==='textarea'?'textarea':'input'} data-i="${i}" data-k="${key}" ${type!=='textarea'?`value="${(val||'').replaceAll('"','&quot;')}"`:''}>${type==='textarea'?(val||'')+'</textarea>':''}</label>`}
function render(){general.innerHTML=`<div class="card"><div class="grid">${f('Motto','tagline',data.tagline,'root')}${f('Über mich','about',data.about,'root','textarea')}</div></div>`;works.innerHTML=data.works.map((w,i)=>`<div class="card"><h3>${w.title}</h3><div class="grid">${f('Titel','title',w.title,i)}${f('Kategorie','category',w.category,i)}${f('Original-Datei','original',w.original,i)}${f('Detail-Datei','detail',w.detail,i)}${f('Mockup-Datei','mockup',w.mockup,i)}${f('Maße','size',w.size,i)}${f('Technik','medium',w.medium,i)}${f('Preis','price',w.price,i)}${f('Status','status',w.status,i)}${f('Beschreibung','description',w.description,i,'textarea')}</div><button class="danger" onclick="del(${i})">Werk löschen</button></div>`).join('');document.querySelectorAll('[data-k]').forEach(el=>el.oninput=()=>{const i=el.dataset.i;if(i==='root')data[el.dataset.k]=el.value;else data.works[+i][el.dataset.k]=el.value})}
function del(i){if(confirm('Werk löschen?')){data.works.splice(i,1);render()}}add.onclick=()=>{data.works.unshift({title:'Neues Werk',category:'Leinwand',original:'assets/',detail:'assets/',mockup:'assets/',size:'',medium:'Acryl auf Leinwand',price:'',status:'Verfügbar',description:'',framing:'Ungerahmt; Rahmung optional'});render()};save.onclick=()=>{localStorage.setItem('colournora_content',JSON.stringify(data));alert('Gespeichert. Die Website-Vorschau in diesem Browser verwendet jetzt diese Daten.')};download.onclick=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='content.json';a.click()}
</script></body></html>
